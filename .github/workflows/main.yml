name: Update IPTV Sources

on:
  schedule:
    # 使用 UTC 时间，每12小时执行一次
    # 下面表示每天的 UTC 00:00 和 12:00 执行（对应北京时间 08:00 和 20:00）
    - cron: '0 0,12 * * *'
  
  # 允许在 GitHub 仓库页面手动触发运行
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script
      run: python getTVList.py  # 请将 your_script_name.py 替换为你实际的 Python 文件名

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')" -a || echo "No changes to commit"
        
        # 拉取远程最新代码并变基
        git pull --rebase origin main
        
        # 推送代码
        git push
